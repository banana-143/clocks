<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Weltzeit</h1>
  <div class="container">
    <div class="clock-box">
        <h2>Berlin</h2>
        <div class="clock" id="berlin">
            <div class="hand hour"></div>
            <div class="hand minute"></div>
            <div class="hand second"></div>
        </div>
        <img src="berlin.jpg" alt="Berlin" width="600">
    </div>

    <div class="clock-box">
        <h2>New York</h2>
        <div class="clock" id="nyc">
            <div class="hand hour"></div>
            <div class="hand minute"></div>
            <div class="hand second"></div>
        </div>
        <img src="nyc.jpg" alt="New York" width="600">
    </div>
      <div class="clock-box">
        <h2>Tokyo</h2>
        <div class="clock" id="tokyo">
            <div class="hand hour"></div>
            <div class="hand minute"></div>
            <div class="hand second"></div>
        </div>
        <img src="https://www.advantour.com/img/japan/images/tokyo.jpg" alt="Tokyo" width="600">
    </div>
  </div>
    <script src="script.js"></script>
</body>
</html>
